baseURL = '/'
title = 'Personal Site'
disableHugoGeneratorInject = true
enableRobotsTXT = true

[params]
  description = 'My Personal Website'

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 20

  [[menus.main]]
    name = 'Projects'
    pageRef = '/projects'
    weight = 30

  [[menus.main]]
    name = 'Resume'
    pageRef = '/resume'
    weight = 40

[markup.goldmark.renderer]
  unsafe = true

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]

# Disable CSS minification. The minifier strips quotes from multi-word
# @font-face family names ("Alegreya SC" -> alegreya sc) and the space in
# `url() format()`, which Firefox refuses to parse — so the custom fonts fail
# to load there (lowercase titles, wrong body size) while Chromium tolerates it.
# HTML/JS are still minified; the gzipped page cost of unminified CSS is ~750 B.
[minify]
  disableCSS = true

